<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassKit - Your School Helper</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- HEADER -->
    <header>
        <nav>
            <a href="/" class="logo">ClassKit</a>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/timetable">Timetable</a></li>
                <li><a href="/flashcards">Flashcards</a></li>
                <li><a href="/timer">Study Timer</a></li>
                <li><a href="/homework">Homework</a></li>
            </ul>
        </nav>
    </header>

    <!-- AD BANNER TOP -->
    <div class="ad-banner">
        <p>Ad Space</p>
    </div>

    <!-- MAIN CONTENT -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- AD BANNER BOTTOM -->
    <div class="ad-banner">
        <p>Ad Space</p>
    </div>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 ClassKit | Made for CBSE Students | All Rights Reserved</p>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
