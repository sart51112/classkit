{% extends 'base.html' %}

{% block content %}

<div class="page-header">
    <h1>✅ Homework Checklist</h1>
    <p>Keep track of all your assignments</p>
</div>

<div class="timetable-container" style="max-width:700px; margin:0 auto;">

    <!-- ADD TASK -->
    <div class="input-section">
        <h2>Add New Task</h2>
        <p style="color:#666; margin-bottom:15px;">✏️ Enter your homework task, subject and due date.</p>

        <div style="display:flex; flex-direction:column; gap:10px; margin-bottom:20px;">
            <input type="text" id="task" placeholder="Task (e.g. Complete Chapter 5 exercises)" style="padding:10px; border:1px solid #ddd; border-radius:8px; font-size:15px;">
            <div style="display:flex; gap:10px; flex-wrap:wrap;">
                <input type="text" id="subject" placeholder="Subject (e.g. Maths)" style="padding:10px; border:1px solid #ddd; border-radius:8px; font-size:15px; flex:1;">
                <input type="date" id="due-date" style="padding:10px; border:1px solid #ddd; border-radius:8px; font-size:15px; flex:1;">
            </div>
            <button onclick="addTask()" class="generate-btn" style="width:fit-content;">Add Task</button>
        </div>
    </div>

    <!-- STATS -->
    <div style="display:flex; gap:15px; margin:20px 0; flex-wrap:wrap;">
        <div style="background:#ede9fe; border-radius:10px; padding:15px 25px; text-align:center; flex:1;">
            <div id="total-count" style="font-size:28px; font-weight:bold; color:#4f46e5;">0</div>
            <div style="color:#666; font-size:14px;">Total Tasks</div>
        </div>
        <div style="background:#d1fae5; border-radius:10px; padding:15px 25px; text-align:center; flex:1;">
            <div id="done-count" style="font-size:28px; font-weight:bold; color:#10b981;">0</div>
            <div style="color:#666; font-size:14px;">Completed</div>
        </div>
        <div style="background:#fee2e2; border-radius:10px; padding:15px 25px; text-align:center; flex:1;">
            <div id="pending-count" style="font-size:28px; font-weight:bold; color:#ef4444;">0</div>
            <div style="color:#666; font-size:14px;">Pending</div>
        </div>
    </div>

    <!-- FILTER -->
    <div style="display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap;">
        <button onclick="filterTasks('all')" class="generate-btn" id="filter-all">All</button>
        <button onclick="filterTasks('pending')" class="clear-btn" id="filter-pending">Pending</button>
        <button onclick="filterTasks('done')" style="background:#10b981; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;" id="filter-done">Completed</button>
    </div>

    <!-- TASK LIST -->
    <div id="task-list">
        <p style="color:#888;">No tasks yet — add your first one above!</p>
    </div>

</div>

<script>
    let tasks = JSON.parse(localStorage.getItem('classkit-homework') || '[]');
    let currentFilter = 'all';

    function addTask() {
        const task = document.getElementById('task').value.trim();
        const subject = document.getElementById('subject').value.trim();
        const dueDate = document.getElementById('due-date').value;

        if (!task || !subject) {
            alert('Please enter a task and subject!');
            return;
        }

        tasks.push({
            id: Date.now(),
            task,
            subject,
            dueDate,
            done: false,
            addedOn: new Date().toLocaleDateString()
        });

        saveTasks();
        document.getElementById('task').value = '';
        document.getElementById('subject').value = '';
        document.getElementById('due-date').value = '';
        renderTasks();
    }

    function toggleTask(id) {
        tasks = tasks.map(t => t.id === id ? {...t, done: !t.done} : t);
        saveTasks();
        renderTasks();
    }

    function deleteTask(id) {
        tasks = tasks.filter(t => t.id !== id);
        saveTasks();
        renderTasks();
    }

    function filterTasks(filter) {
        currentFilter = filter;
        renderTasks();
    }

    function saveTasks() {
        localStorage.setItem('classkit-homework', JSON.stringify(tasks));
    }

    function renderTasks() {
        const list = document.getElementById('task-list');
        const done = tasks.filter(t => t.done).length;
        const pending = tasks.filter(t => !t.done).length;

        document.getElementById('total-count').textContent = tasks.length;
        document.getElementById('done-count').textContent = done;
        document.getElementById('pending-count').textContent = pending;

        let filtered = tasks;
        if (currentFilter === 'pending') filtered = tasks.filter(t => !t.done);
        if (currentFilter === 'done') filtered = tasks.filter(t => t.done);

        if (filtered.length === 0) {
            list.innerHTML = '<p style="color:#888;">No tasks here!</p>';
            return;
        }

        list.innerHTML = filtered.map(t => `
            <div style="display:flex; align-items:center; gap:15px; background:${t.done ? '#f0fdf4' : 'white'}; border:1px solid ${t.done ? '#86efac' : '#e5e7eb'}; border-radius:10px; padding:15px; margin-bottom:10px;">
                <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${t.id})" style="width:20px; height:20px; cursor:pointer; accent-color:#4f46e5;">
                <div style="flex:1;">
                    <div style="font-weight:bold; ${t.done ? 'text-decoration:line-through; color:#888;' : ''}">${t.task}</div>
                    <div style="font-size:13px; color:#666; margin-top:4px;">
                        📚 ${t.subject}
                        ${t.dueDate ? `· 📅 Due: ${new Date(t.dueDate).toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'})}` : ''}
                    </div>
                </div>
                <button onclick="deleteTask(${t.id})" class="clear-btn" style="padding:5px 12px; font-size:13px;">✕</button>
            </div>
        `).join('');
    }

    renderTasks();
</script>

{% endblock %}
